<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="16" fill="#1B4D4F"/>

  <!-- Globe Icon (Translation Symbol) -->
  <circle cx="16" cy="16" r="10" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>

  <!-- Horizontal Lines (Latitude) -->
  <path d="M6 16 L26 16" stroke="#FFFFFF" stroke-width="1.5"/>
  <path d="M8 11 L24 11" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
  <path d="M8 21 L24 21" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>

  <!-- Vertical Ellipse (Longitude) -->
  <ellipse cx="16" cy="16" rx="4" ry="10" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>

  <!-- T Letter for Translation -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700" text-anchor="middle">T</text>
</svg>
