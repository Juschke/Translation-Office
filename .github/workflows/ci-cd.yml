name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Job 1: Backend (Laravel)
  laravel-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # Composer lock requires 8.4
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, intl
          coverage: none

      - name: Install Composer Dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-ansi --no-interaction --no-scripts --no-progress

      - name: Prepare Laravel Environment
        working-directory: ./backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Create SQLite Database
        working-directory: ./backend
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run Migrations
        working-directory: ./backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan migrate --force

      - name: Run PHP Tests
        working-directory: ./backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  # Job 2: Frontend (React)
  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # LTS
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install NPM Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  # Job 3: Deployment
  deploy:
    needs: [laravel-tests, frontend-build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ngcobalt389.manitu.net
          username: ssh300009910
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. In das Verzeichnis auf dem Server wechseln
            cd /home/sites/site100037608/web/dev.itc-ks.com
            
            # 2. Neuesten Code vom Branch 'main' ziehen
            git pull origin main
            
            # 3. Backend Abhängigkeiten installieren & Cache leeren
            cd backend
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            php artisan migrate --force
            php artisan optimize:clear
            
            # WICHTIG: Falls Node.js / npm auf deinem Shared-Hosting existiert, 
            # kannst du das Frontend dort neubauen. Wenn nicht, musst du die 
            # Frontend-Build-Schritte (dist-Ordner) per rsync/scp übertragen.
            cd ../frontend
            npm install || true
            npm run build || true
